server {
    listen 80;

    # Forward API + actuator calls to the backend container (same role the
    # Vite dev proxy plays during development).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /actuator/ {
        proxy_pass http://backend:8080;
    }

    # Serve the React build; fall back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
