<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#28328c" />

    <!-- Indexing enabled — this is published as a labelled portfolio demo
         (bookings disabled via VITE_DEMO_MODE). -->
    <meta name="robots" content="index, follow" />

    <title>GoJulley — Ladakh Trip Booking · Packages, Stays, Bikes &amp; Taxis</title>
    <meta
      name="description"
      content="Book your whole Ladakh trip in one place — curated packages or individual stays, taxis, bikes and services across Leh, Nubra and Pangong. Permits, driver and support, booked and paid together."
    />
    <link rel="canonical" href="https://gojulley.com/" />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GoJulley" />
    <meta property="og:title" content="GoJulley — Your whole Ladakh trip, handled" />
    <meta
      property="og:description"
      content="Curated packages or individual stays and rides across Leh, Nubra and Pangong — permits, driver and support, booked and paid in one place."
    />
    <meta property="og:url" content="https://gojulley.com/" />
    <meta property="og:image" content="https://gojulley.com/photos/places/pangong.jpg" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GoJulley — Your whole Ladakh trip, handled" />
    <meta
      name="twitter:description"
      content="Curated packages or individual stays and rides across Leh, Nubra and Pangong."
    />
    <meta name="twitter:image" content="https://gojulley.com/photos/places/pangong.jpg" />

    <!-- Structured data (safe: brand/site only — add Product/Offer per trip at real launch). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "GoJulley",
        "url": "https://gojulley.com",
        "logo": "https://gojulley.com/logo.png",
        "image": "https://gojulley.com/photos/places/pangong.jpg",
        "description": "Book your whole Ladakh trip — curated packages, stays, taxis, bikes and services across Leh, Nubra and Pangong.",
        "areaServed": { "@type": "Place", "name": "Ladakh, India" },
        "knowsAbout": ["Ladakh trips", "Leh", "Nubra Valley", "Pangong Lake", "bike rental", "trip packages"]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "GoJulley",
        "url": "https://gojulley.com"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
